# Sonnet Create — swiftlint 설정
# 기존 코드베이스가 경고 없이 통과하는 수준의 보수적 규칙. 스타일 강제보다
# 실수(강제 언래핑, 거대 함수, print 잔류) 감지가 목적.

included:
  - App
  - Packages/*/Sources

excluded:
  - "**/.build"
  - dist
  - Scripts

disabled_rules:
  - blanket_disable_command  # 로컬라이제이션 사전 등 파일 단위 예외 허용
  - todo                     # 작업 메모 허용
  - trailing_comma           # swiftformat --commas always와 충돌 방지
  - opening_brace            # SwiftUI 뷰 빌더 스타일과 충돌
  - identifier_name          # l10n, s, c 같은 관용 축약 허용
  - nesting                  # SwiftUI 중첩 타입 관용구 허용

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 1200
  error: 2000

type_body_length:
  warning: 600
  error: 1000

function_body_length:
  warning: 120
  error: 250

cyclomatic_complexity:
  warning: 20
  error: 40

large_tuple:
  warning: 4

force_unwrapping:
  severity: warning

opt_in_rules:
  - force_unwrapping
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - redundant_nil_coalescing
