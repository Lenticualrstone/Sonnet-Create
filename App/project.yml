name: SonnetCreate
options:
  bundleIdPrefix: com.seolhwarim
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  AppCore:
    path: ../Packages/AppCore
  DesignSystem:
    path: ../Packages/DesignSystem
  PersistenceKit:
    path: ../Packages/PersistenceKit
  RenderingKit:
    path: ../Packages/RenderingKit
  DocumentKit:
    path: ../Packages/DocumentKit
  FileManagerKit:
    path: ../Packages/FileManagerKit
  AIAgentKit:
    path: ../Packages/AIAgentKit
  ScenarioEditor:
    path: ../Packages/ScenarioEditor
  MindMapEditor:
    path: ../Packages/MindMapEditor
  MarkdownEditor:
    path: ../Packages/MarkdownEditor
  SettingsKit:
    path: ../Packages/SettingsKit
  BackupKit:
    path: ../Packages/BackupKit
  SecurityKit:
    path: ../Packages/SecurityKit

targets:
  SonnetCreate:
    type: application
    platform: macOS
    sources:
      - path: SonnetCreate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.seolhwarim.sonnetcreate
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: AppCore
      - package: DesignSystem
      - package: PersistenceKit
      - package: RenderingKit
      - package: DocumentKit
      - package: FileManagerKit
      - package: AIAgentKit
      - package: ScenarioEditor
      - package: MindMapEditor
      - package: MarkdownEditor
      - package: SettingsKit
      - package: BackupKit
      - package: SecurityKit

schemes:
  SonnetCreate:
    build:
      targets:
        SonnetCreate: all
    run:
      config: Debug
    archive:
      config: Release
