name: SonnetCreate
options:
  bundleIdPrefix: com.seolhwarim
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "2.0.2"
    CURRENT_PROJECT_VERSION: "9"

packages:
  AppCore:
    path: ../Packages/AppCore
  DesignSystem:
    path: ../Packages/DesignSystem
  PersistenceKit:
    path: ../Packages/PersistenceKit
  RenderingKit:
    path: ../Packages/RenderingKit
  DocumentKit:
    path: ../Packages/DocumentKit
  FileManagerKit:
    path: ../Packages/FileManagerKit
  AIAgentKit:
    path: ../Packages/AIAgentKit
  ScenarioEditor:
    path: ../Packages/ScenarioEditor
  MindMapEditor:
    path: ../Packages/MindMapEditor
  MarkdownEditor:
    path: ../Packages/MarkdownEditor
  SettingsKit:
    path: ../Packages/SettingsKit
  BackupKit:
    path: ../Packages/BackupKit
  SecurityKit:
    path: ../Packages/SecurityKit

targets:
  SonnetCreate:
    type: application
    platform: macOS
    sources:
      - path: SonnetCreate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.seolhwarim.sonnetcreate
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
    # 문서 UTI 선언(Quick Look/더블클릭 열기)이 필요해져 생성형 Info.plist 대신
    # 명시적 프로퍼티로 전환했다 — INFOPLIST_KEY_* 로는 딕셔너리 키를 못 넣는다.
    info:
      path: SonnetCreate/Info.plist
      properties:
        CFBundleDisplayName: "Sonnet Create"
        CFBundleName: "Sonnet Create"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: ""
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        CFBundleDocumentTypes:
          - CFBundleTypeName: "Sonnet Create Scenario"
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSTypeIsPackage: true
            LSItemContentTypes: [com.seolhwarim.sonnetcreate.scenario]
          - CFBundleTypeName: "Sonnet Create Mind Map"
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSTypeIsPackage: true
            LSItemContentTypes: [com.seolhwarim.sonnetcreate.mindmap]
          - CFBundleTypeName: "Sonnet Create Page"
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSTypeIsPackage: true
            LSItemContentTypes: [com.seolhwarim.sonnetcreate.page]
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.seolhwarim.sonnetcreate.scenario
            UTTypeDescription: "Sonnet Create Scenario"
            UTTypeConformsTo: [com.apple.package, public.content]
            UTTypeTagSpecification:
              public.filename-extension: [scen]
          - UTTypeIdentifier: com.seolhwarim.sonnetcreate.mindmap
            UTTypeDescription: "Sonnet Create Mind Map"
            UTTypeConformsTo: [com.apple.package, public.content]
            UTTypeTagSpecification:
              public.filename-extension: [scno]
          - UTTypeIdentifier: com.seolhwarim.sonnetcreate.page
            UTTypeDescription: "Sonnet Create Page"
            UTTypeConformsTo: [com.apple.package, public.content]
            UTTypeTagSpecification:
              public.filename-extension: [scpa]
    dependencies:
      - package: AppCore
      - package: DesignSystem
      - package: PersistenceKit
      - package: RenderingKit
      - package: DocumentKit
      - package: FileManagerKit
      - package: AIAgentKit
      - package: ScenarioEditor
      - package: MindMapEditor
      - package: MarkdownEditor
      - package: SettingsKit
      - package: BackupKit
      - package: SecurityKit
      - target: QuickLookPreview

  SonnetCreateUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: SonnetCreateUITests
    dependencies:
      - target: SonnetCreate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.seolhwarim.sonnetcreate.uitests
        TEST_TARGET_NAME: SonnetCreate
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES

  QuickLookPreview:
    type: app-extension
    platform: macOS
    sources:
      - path: QuickLookPreview
    dependencies:
      - package: DocumentKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.seolhwarim.sonnetcreate.quicklook
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: QuickLookPreview/QuickLookPreview.entitlements
      properties:
        com.apple.security.app-sandbox: true
    info:
      path: QuickLookPreview/Info.plist
      properties:
        CFBundleDisplayName: "Sonnet Create Quick Look"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.quicklook.preview
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).PreviewProvider"
          NSExtensionAttributes:
            QLIsDataBasedPreview: true
            QLSupportedContentTypes:
              - com.seolhwarim.sonnetcreate.scenario
              - com.seolhwarim.sonnetcreate.mindmap
              - com.seolhwarim.sonnetcreate.page

schemes:
  SonnetCreate:
    build:
      targets:
        SonnetCreate: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SonnetCreateUITests
    archive:
      config: Release
